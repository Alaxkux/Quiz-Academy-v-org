<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C8EFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4DFFC3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4DFFC3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6C8EFF;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="16" fill="url(#grad)"/>
  <!-- Q letter -->
  <text x="32" y="44" font-family="'Outfit', 'DM Sans', system-ui, sans-serif"
    font-size="38" font-weight="900" text-anchor="middle"
    fill="white" letter-spacing="-2">Q</text>
  <!-- Small star accent -->
  <circle cx="46" cy="18" r="5" fill="url(#grad2)" opacity="0.9"/>
  <text x="46" y="22" font-size="7" text-anchor="middle" fill="#07090E">✦</text>
</svg>
