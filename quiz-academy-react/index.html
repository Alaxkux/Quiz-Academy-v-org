<!DOCTYPE html>
<html lang="en" data-theme="midnight">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#07090E">
  <title>Quiz Academy — Master Any Subject</title>
    <meta name="description" content="AI-powered quiz platform with 20 XP levels, CBT exam mode, streaks, leaderboard and course builder. Free forever." />
    <meta name="theme-color" content="#6C8EFF" />
    <meta property="og:title" content="Quiz Academy" />
    <meta property="og:description" content="Master any subject, one quiz at a time." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
  <script>
    (function() {
      var t = localStorage.getItem('qa_theme') || 'midnight';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <style>
    #splash {
      position: fixed; inset: 0; z-index: 9999;
      background: #07090E;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
    }
    #splash.hidden { opacity: 0; pointer-events: none; transition: opacity 0.5s; }
    .splash-letters { display: flex; gap: 4px; }
    .splash-letter {
      font-family: 'Outfit', sans-serif;
      font-size: 2.5rem; font-weight: 900; letter-spacing: -0.03em;
      color: #EDF0FA;
      animation: bubbleIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .splash-letter.accent { background: linear-gradient(135deg,#6C8EFF,#4DFFC3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    @keyframes bubbleIn {
      from { transform: scale(0) translateY(20px); opacity: 0; }
      to   { transform: scale(1) translateY(0);    opacity: 1; }
    }
    .splash-dots { display: flex; gap: 6px; }
    .splash-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: linear-gradient(135deg,#6C8EFF,#4DFFC3);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .splash-dot:nth-child(2) { animation-delay: 0.2s; }
    .splash-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,80%,100% { transform: scale(0.6); opacity: 0.4; }
      40%          { transform: scale(1.2); opacity: 1; }
    }
  </style>
  <div id="splash">
    <div class="splash-letters">
      <span class="splash-letter" style="animation-delay:0.0s">Q</span>
      <span class="splash-letter" style="animation-delay:0.07s">u</span>
      <span class="splash-letter" style="animation-delay:0.14s">i</span>
      <span class="splash-letter" style="animation-delay:0.21s">z</span>
      <span class="splash-letter accent" style="animation-delay:0.32s;margin-left:8px">A</span>
      <span class="splash-letter" style="animation-delay:0.39s">c</span>
      <span class="splash-letter" style="animation-delay:0.46s">a</span>
      <span class="splash-letter" style="animation-delay:0.53s">d</span>
      <span class="splash-letter" style="animation-delay:0.60s">e</span>
      <span class="splash-letter" style="animation-delay:0.67s">m</span>
      <span class="splash-letter" style="animation-delay:0.74s">y</span>
    </div>
    <div class="splash-dots">
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
    </div>
  </div>
  <div id="root"></div>
  <script>
    // Hide splash after app loads
    window.addEventListener('load', function() {
      setTimeout(function() {
        var s = document.getElementById('splash');
        if (s) { s.classList.add('hidden'); setTimeout(function(){ s.remove(); }, 600); }
      }, 1400);
    });
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
